name: "Build package on tag"

on:
  push:
    tags:
      - "v*.*.*"   # run every time we create a semantic version tag

jobs:
  build-package:
    name: "Build wheel and sdist with uv"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install uv"
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: "Install project (for build tools, if any)"
        run: |
          uv sync --all-extras --dev

      - name: "Build package"
        run: |
          # Generate wheel and sdist in dist/
          uv build

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "dist-${{ github.ref_name }}"
          path: dist/
name: "Deploy on tag"

on:
  push:
    tags:
      - "v*.*.*"   # run every time we create a semantic version tag

jobs:
  deploy:
    name: "Prepare deploy for tagged release"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install uv"
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: "Install project dependencies with uv"
        run: |
          # Install the project's dependencies as defined in pyproject.toml.
          uv sync

      # Placeholder: when pyproject.toml defines a [build-system] and build backend,
      # you can enable a build step here, e.g.:
      #
      # - name: "Build package"
      #   run: |
      #     uv build
      #
      # and then upload artifacts or publish to a package index.
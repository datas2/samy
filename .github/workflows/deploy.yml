name: "Deploy on tag"

on:
  push:
    tags:
      - "v*.*.*"   # run every time we create a semantic version tag

jobs:
  deploy:
    name: "Prepare deploy for tagged release"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: "Install uv"
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: "Install project dependencies with uv"
        run: |
          # Install the project's dependencies as defined in pyproject.toml.
          uv sync

      - name: "Build package"
        run: |
          uv build

name: "Run tests"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tests:
    name: "Unit, integration and e2e tests"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install uv"
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: "Install project dependencies with uv"
        run: |
          # Sync dependencies as defined in pyproject.toml.
          # We don't pass --all-extras/--dev because this project does not define those groups.
          uv sync

      - name: "Run unit tests"
        run: |
          if [ -d tests/unit ]; then
            uv run pytest tests/unit
          else
            echo "No unit tests found in tests/unit, skipping."
          fi

      - name: "Run integration tests"
        run: |
          if [ -d tests/integration ]; then
            uv run pytest tests/integration
          else
            echo "No integration tests found in tests/integration, skipping."
          fi

      - name: "Run e2e tests"
        run: |
          if [ -d tests/e2e ]; then
            uv run pytest tests/e2e
          else
            echo "No e2e tests found in tests/e2e, skipping."
          fi
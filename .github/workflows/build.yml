name: "Auto tag on master"

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  auto-tag:
    name: "Generate semantic tag from conventional commits"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          # full history is required so the action can inspect previous tags/commits
          fetch-depth: 0

      - name: "Create tag (SemVer from commits)"
        # Using the published v6.2 tag for simplicity
        uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # optional prefix (e.g., "v1.2.3")
          tag_prefix: v

      - name: "Sync pyproject version with new tag"
        if: steps.tag.outputs.new_tag != ''
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"   # e.g., v0.0.2
          VER="${TAG#v}"                           # 0.0.2
          echo "New tag: $TAG"
          echo "Updating pyproject.toml version to $VER"

          sed -i "s/^version = \".*\"/version = \"$VER\"/" pyproject.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          git commit -m "chore: bump version to $VER" || echo "No changes to commit"

          git push origin HEAD:master
name: "Auto tag on master"

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  auto-tag:
    name: "Generate semantic tag from conventional commits"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          # full history is required so the action can inspect previous tags/commits
          fetch-depth: 0

      - name: "Determine next tag (SemVer from commits)"
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          dry_run: true               # só calcula, não cria/push a tag
          skip_untagged_workflows: true

      - name: "Sync pyproject version with next tag"
        if: steps.tag.outputs.new_tag != ''
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"   # e.g., v0.0.2
          VER="${TAG#v}"                           # 0.0.2
          echo "Next tag will be: $TAG"
          echo "Updating pyproject.toml version to $VER"

          sed -i "s/^version = \".*\"/version = \"$VER\"/" pyproject.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          git commit -m "chore: bump version to $VER" || echo "No changes to commit"

          git push origin HEAD:master

      - name: "Create and push tag"
        if: steps.tag.outputs.new_tag != ''
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          echo "Creating tag $NEW_TAG on latest commit"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"